name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # Bash trên mọi OS (Windows dùng Git Bash) để env var + $(...) đồng nhất.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      # Tauri v2 Linux system dependencies
      # https://v2.tauri.app/start/prerequisites/#linux
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust (stable)
        run: |
          rustup toolchain install stable --profile minimal --component clippy
          rustup default stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Frontend build first: tauri-build expects frontendDist (../dist) to exist.
      - name: Frontend build
        run: pnpm run build

      - name: Cargo build
        working-directory: src-tauri
        run: cargo build

      - name: Clippy (deny warnings)
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      # BROWSERX_MASTER_KEY: crypto dùng khoá từ env, không đụng OS keychain
      # (Linux runner không có keychain; macOS runner không bung popup).
      - name: Cargo test
        working-directory: src-tauri
        run: BROWSERX_MASTER_KEY="$(openssl rand -base64 32)" cargo test
